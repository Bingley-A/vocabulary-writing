<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>词语听说读写</title>
  <style>
    :root{
      --c1:#FF6F61; --c2:#FFB74D; --c3:#4DB6AC; --c4:#64B5F6; --c5:#BA68C8;
      --bg1:#FFF3E0; --bg2:#E1F5FE;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Comic Sans MS","Helvetica Neue",Arial,"PingFang SC",sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),#F3E5F5);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
      overflow-x:hidden;
    }
    .wrap{
      width:100%; max-width:1200px; background:#fff; border-radius:18px;
      padding:18px; box-shadow:0 12px 40px rgba(0,0,0,0.12); position:relative; z-index:1;
    }
    header{display:flex; align-items:center; gap:12px}
    .logo{width:84px; height:84px; border-radius:18px;
      background:conic-gradient(from 45deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c1));
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:40px; font-weight:900;
      box-shadow:0 8px 26px rgba(0,0,0,0.18)}
    h1{margin:0; font-size:24px; color:var(--c1)}
    main{margin-top:14px}

    #home{display:block}
    .card{background:#fff; border-radius:14px; padding:14px; box-shadow:0 8px 22px rgba(0,0,0,0.06); margin-bottom:14px}
    .grade-selects{display:flex; gap:12px; flex-wrap:wrap; margin-top:12px}
    .grade-btn{flex:1; min-width:120px; padding:14px; border-radius:12px; font-weight:900;
      background:linear-gradient(135deg,var(--c2),var(--c1)); color:#fff; text-align:center; cursor:pointer; transition:.15s}
    .grade-btn.selected{outline:5px solid #64B5F6; transform:translateY(-4px)}
    .num-select{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
    .num-btn{padding:10px 14px; border-radius:12px; font-weight:800; cursor:pointer;
      background:linear-gradient(135deg,var(--c3),var(--c4)); color:#fff}
    .num-btn.selected{outline:4px solid #FFB74D; transform:scale(1.03)}
    .custom-box{display:flex; align-items:center; gap:8px; margin-top:10px}
    .custom-input{width:90px; padding:8px; border:3px solid var(--c4); border-radius:10px; text-align:center; font-weight:700}
    .start-btn{background:linear-gradient(90deg,var(--c1),var(--c2)); border:none; color:#fff;
      padding:14px 20px; border-radius:14px; font-weight:900; font-size:16px; cursor:pointer;
      box-shadow:0 8px 28px rgba(0,0,0,0.18); margin-top:14px}

    #game{display:none; position:relative}
    .animal-emoji{position:fixed; font-size:40px; opacity:0.5; z-index:0; pointer-events:none}
    .animal-1{top:6%; left:17%} .animal-2{top:8%; right:12%} .animal-3{bottom:15%; left:5%}
    .animal-4{bottom:12%; right:8%} .animal-5{top:40%; left:3%} .animal-6{top:55%; right:5%}

    .game-content{display:flex; width:100%; gap:20px; margin:14px 0; position:relative; z-index:1}
    .char-box{flex:1; text-align:center; padding:10px}
    .word{display:flex; justify-content:center; gap:10px;}
    .word-char-container{display:flex; flex-direction:column; align-items:center;}
    .pinyin-display{font-size:24px; color:#000; margin-bottom:5px;height: 30px; line-height: 30px;}
    .word-char{font-size:100px; font-weight:900; color:var(--c1); transition: color 0.3s;}
    .word-char.inactive{color: #ccc;}
    .meta{font-size:16px; margin-top:6px; color:#333}
    .play-btn{margin-top:8px; padding:8px 14px; border:none; border-radius:12px;
      background:linear-gradient(90deg,var(--c3),var(--c4)); color:#fff; font-weight:800; cursor:pointer}

    .choices{flex:1; display:flex; flex-direction:column; gap:12px; margin-top:14px;
      transition:opacity 0.6s ease}
    .choice{padding:16px; border-radius:14px; font-weight:900; font-size:22px; cursor:pointer;
      background:linear-gradient(135deg,#FFFDE7,#FFF9C4); border:3px solid rgba(0,0,0,0.03); transition:.12s;
      text-align:center}
    .choice:hover{transform:translateY(-4px)}
    .choice.correct{background:linear-gradient(135deg,#DCEDC8,#A5D6A7); border-color:#43A047; color:#1B5E20}
    .choice.wrong{background:linear-gradient(135deg,#FFCDD2,#EF9A9A); border-color:#E53935; color:#B71C1C}
    .choice.selected{border:3px solid #000;}

    .progress{height:14px; background:#eee; border-radius:8px; overflow:hidden; margin-top:12px}
    .progress>div{height:100%; width:0%; background:linear-gradient(90deg,var(--c2),var(--c1))}
    .next-btn{background:linear-gradient(90deg,var(--c4),var(--c5)); border:none; color:#fff; padding:10px 16px;
      border-radius:12px; font-weight:900; margin-top:12px; cursor:pointer}
    .home-btn{background:#fff; border:2px dashed var(--c4); padding:8px 12px; border-radius:12px; cursor:pointer; margin-top:12px}

    .rec-row{display:flex; gap:8px; align-items:center; justify-content:center; margin-top:10px}
    .rec-btn{padding:8px 12px; border-radius:10px; border:none; font-weight:800; cursor:pointer}
    .rec-indicator{font-size:13px; color:#666; margin-left:6px}
    .transcript{font-weight:800; padding:6px 8px; border-radius:8px; border:2px solid transparent;
      margin-left:10px; min-width:160px; text-align:center}
    .rec-play-wrap{display:flex; flex-direction:column; align-items:center; margin-top:10px}

    /* 新增提示样式 */
    .stage-indicator {
      font-size: 16px;
      font-weight: bold;
      margin: 10px 0;
      padding: 8px;
      border-radius: 8px;
      background-color: #f0f7ff;
      color: #1976d2;
    }

    @media (max-width:760px){
      .game-content{flex-direction:column}
      .word-char{font-size:48px}
      .pinyin-display{font-size:18px;height: 30px; line-height: 30px;}
    }

    #end{display:none; text-align:center}
    .end-card{padding:20px; border-radius:16px; background:linear-gradient(135deg,#FFF3E0,#FFE0B2)}
    .score-big{font-size:36px; font-weight:900; color:var(--c1); margin:10px 0}
    .encourage{margin-top:12px; font-size:18px; font-weight:900; color:var(--c5)}
    footer{margin-top:16px; text-align:center; color:#999; font-weight:700}

    /* 奖励动画 */
    .reward-animation {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:rgba(255,255,255,0.9);
      z-index:1000;
      animation:fadeInOut 3s forwards;
    }
    .reward-text {
      font-size:42px;
      font-weight:900;
      color:var(--c1);
      text-shadow:2px 2px 4px rgba(0,0,0,0.2);
      margin-bottom:20px;
      animation:bounce 1s infinite alternate;
    }
    .reward-emoji {
      font-size:80px;
      animation:spin 2s infinite;
    }
    @keyframes fadeInOut {
      0% { opacity:0; }
      20% { opacity:1; }
      80% { opacity:1; }
      100% { opacity:0; visibility:hidden; }
    }
    @keyframes bounce {
      from { transform:scale(1); }
      to { transform:scale(1.1); }
    }
    @keyframes spin {
      from { transform:rotate(0deg); }
      to { transform:rotate(360deg); }
    }

    /* 结算动画 */
    .celebration {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:999;
    }
    .confetti {
      position:absolute;
      width:10px;
      height:20px;
      background:var(--c1);
      top:-20px;
      animation:fall linear forwards;
    }
    .confetti:nth-child(2n) { background:var(--c2); }
    .confetti:nth-child(3n) { background:var(--c3); }
    .confetti:nth-child(4n) { background:var(--c4); }
    .confetti:nth-child(5n) { background:var(--c5); }
    @keyframes fall {
      to {
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
      }
    }
    .firework {
      position:absolute;
      width:5px;
      height:5px;
      border-radius:50%;
      box-shadow:0 0 10px 2px;
      animation:explode 1s forwards;
    }
    @keyframes explode {
      0% {
        transform:scale(1);
        opacity:1;
      }
      100% {
        transform:scale(20);
        opacity:0;
      }
    }
    .superman {
      position: fixed;
      top: 50%;
      left: -100px;
      transform: translateY(-50%);
      font-size: 80px;
      animation: flyRight 3s forwards;
      z-index: 1001;
    }
    @keyframes flyRight {
      0% {
        left: -100px;
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        left: 100vw;
        opacity: 0;
      }
    }

    /* 词语选择弹窗样式 */
    #word-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 18px;
      padding: 20px;
      width: 95vw;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .grade-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 5px;
      margin-bottom: 20px;
    }
    .word-btn {
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      padding: 5px;
    }
    .word-btn.selected {
      background: #FFB74D;
      color: white;
    }
    .select-all-btn {
      padding: 5px 10px;
      background: linear-gradient(90deg,var(--c3),var(--c4));
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-footer {
      text-align: center;
      margin-top: 20px;
    }

    /* 书写区域 */
    #writing-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
    }
    .writer-div {
      width: 300px;
      height: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fff;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>
  <div class="animal-emoji animal-1">🐰</div>
  <div class="animal-emoji animal-2">🐯</div>
  <div class="animal-emoji animal-3">🐵</div>
  <div class="animal-emoji animal-4">🐶</div>
  <div class="animal-emoji animal-5">🐦</div>
  <div class="animal-emoji animal-6">🐘</div>

  <div class="wrap" role="application" aria-label="词语听说读写">
    <header>
      <div class="logo">词</div>
      <h1>词语听说读写</h1>
    </header>

    <main>
      <!-- HOME -->
      <section id="home">
        <div class="card">
          <div style="font-weight:900">请选择年级</div>
          <div class="grade-selects" id="grade-selects">
            <div class="grade-btn" data-grade="1">一年级<br><span style="font-size:13px;opacity:.9">33词</span></div>
            <div class="grade-btn" data-grade="2">二年级<br><span style="font-size:13px;opacity:.9">45词</span></div>
            <div class="grade-btn" data-grade="3">三年级<br><span style="font-size:13px;opacity:.9">64词</span></div>
            <div class="grade-btn" data-grade="4">四年级<br><span style="font-size:13px;opacity:.9">64词</span></div>
            <div class="grade-btn" data-grade="5">五年级<br><span style="font-size:13px;opacity:.9">77词</span></div>
          </div>
        </div>

        <div class="card">
          <div style="font-weight:900">题目数量</div>
          <div class="num-select" id="num-select">
            <div class="num-btn" data-num="10">10</div>
            <div class="num-btn" data-num="20">20</div>
            <div class="num-btn" data-num="30">30</div>
            <div class="num-btn" data-num="40">40</div>
            <div class="num-btn selected" data-num="all">全部</div>
          </div>
          <div class="custom-box">
            <label for="custom-num" style="font-weight:800">自定义：</label>
            <input id="custom-num" class="custom-input" type="number" min="1" placeholder="数量">
            <div style="font-size:13px;color:#666">（超过最大值会自动取最大）</div>
            <button id="select-words" style="background:linear-gradient(90deg,var(--c4),var(--c5));border:none;color:#fff;padding:8px 12px;border-radius:10px;font-weight:800;cursor:pointer">选择词语</button>
          </div>
        </div>

        <button id="start-game" class="start-btn">开始练习</button>
      </section>

      <!-- GAME -->
      <section id="game" aria-live="polite">
        <div class="topbar" style="display:flex;justify-content:space-between;">
          <div id="game-grade" style="font-weight:900">四年级</div>
          <div id="q-count" style="font-weight:900">0 / 0</div>
        </div>

        <!-- 新增阶段提示 -->
        <div class="stage-indicator" id="stage-indicator">第一阶段：请先朗读词语并录音验证</div>

        <div class="game-content">
          <div class="char-box">
            <div id="word-display" class="word"></div>
            <div id="writing-container" style="display:none;"></div>
            <div class="meta" id="meta-line">（英文释义）</div>
            <div style="margin-top:6px">
              <button id="play-sound" class="play-btn">播放词语发音</button>
            </div>

            <div class="rec-row">
              <button id="rec-btn" class="rec-btn" style="background:linear-gradient(90deg,var(--c1),var(--c2));color:#fff">开始录音</button>
              <button id="stop-rec-btn" class="rec-btn" style="background:linear-gradient(90deg,var(--c3),var(--c4));color:#fff;display:none">停止录音</button>
              <span id="rec-status" class="rec-indicator">（未录音）</span>
              <div id="transcript" class="transcript" title="识别结果显示在这里">（识别结果）</div>
            </div>

            <div class="rec-play-wrap">
              <audio id="user-rec-audio" controls style="display:none;margin-top:8px"></audio>
            </div>
          </div>

          <div class="choices" id="choices"></div>
        </div>

        <div class="progress"><div id="progress-bar"></div></div>
        <div id="score-text" style="margin-top:10px;font-weight:900">得分：0</div>

        <div style="display:flex;gap:10px;margin-top:12px;justify-content:center;">
          <button id="next-btn" class="next-btn" style="display:none">下一题</button>
          <button id="quit-btn" class="home-btn">结束并返回</button>
        </div>
      </section>

      <!-- END -->
      <section id="end">
        <div class="end-card">
          <div style="font-weight:900">本轮完成</div>
          <div class="score-big" id="final-score">0 / 0</div>
          <div class="encourage" id="encourage"></div>
         <!-- 新增：查看本轮词语按钮 -->
<div style="margin: 24px 0; text-align: center;">
  <button id="show-this-round-words" class="start-btn">
    查看本轮词语（共 <span id="this-round-word-count">0</span> 个）
  </button>
</div>
          <div style="margin-top:12px;display:flex;gap:10px;justify-content:center">
            <button id="retry-btn" class="start-btn">再来一次</button>
            <button id="back-home-btn" class="home-btn">返回首页</button>
          </div>
        </div>
      </section>
    </main>

    <footer>快乐学词语 🎈</footer>
  </div>

  <!-- 词语选择弹窗 -->
  <div id="word-modal">
    <div class="modal-content">
      <div id="grade-sections"></div>
      <div class="modal-footer">
        <button id="start-custom" class="start-btn">开始练习</button>
        <button id="cancel-modal" class="home-btn">取消</button>
      </div>
    </div>
  </div>
 <!-- 结算页 - 本轮词语查看模态框 -->
<div id="result-word-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px;">
  <div class="modal-content" style="background:white; border-radius:18px; padding:24px; width:95vw; max-width:900px; max-height:85vh; overflow-y:auto;">
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="margin:0; color:var(--c1);">本轮练习词语</h2>
      <button id="close-result-modal" style="background:none; border:none; font-size:28px; cursor:pointer; color:#666;">×</button>
    </div>
    
    <div id="result-word-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px;"></div>
    
    <div style="margin-top:24px; text-align:center;">
      <button id="close-result-modal-btn" class="home-btn" style="padding:10px 24px;">关闭</button>
    </div>
  </div>
</div>
  <audio id="audio" preload="auto" style="display:none"></audio>

  <script>
    let wordCorrectStatus = [];  // 记录每道题是否正确，true=正确，false=错误
    // 修改：在gradeWords中增加每个字的声母(initial)和韵母(final)信息
    const gradeWords = {
  1: [{ word: "一二", pinyin: "yī èr", syllables: [{ char: "一", pinyinBase: "yi", tone: 1, initial: "y", final: "i" }, { char: "二", pinyinBase: "er", tone: 4, initial: "e", final: "er" }], english: "one two" },
{ word: "三四", pinyin: "sān sì", syllables: [{ char: "三", pinyinBase: "san", tone: 1, initial: "s", final: "an" }, { char: "四", pinyinBase: "si", tone: 4, initial: "s", final: "i" }], english: "three four" },
{ word: "五六", pinyin: "wǔ liù", syllables: [{ char: "五", pinyinBase: "wu", tone: 3, initial: "w", final: "u" }, { char: "六", pinyinBase: "liu", tone: 4, initial: "l", final: "iu" }], english: "five six" },
{ word: "七八", pinyin: "qī bā", syllables: [{ char: "七", pinyinBase: "qi", tone: 1, initial: "q", final: "i" }, { char: "八", pinyinBase: "ba", tone: 1, initial: "b", final: "a" }], english: "seven eight" },
{ word: "九十", pinyin: "jiǔ shí", syllables: [{ char: "九", pinyinBase: "jiu", tone: 3, initial: "j", final: "iu" }, { char: "十", pinyinBase: "shi", tone: 2, initial: "sh", final: "i" }], english: "nine ten" },
{ word: "上下", pinyin: "shàng xià", syllables: [{ char: "上", pinyinBase: "shang", tone: 4, initial: "sh", final: "ang" }, { char: "下", pinyinBase: "xia", tone: 4, initial: "x", final: "ia" }], english: "up and down" },
{ word: "大小", pinyin: "dà xiǎo", syllables: [{ char: "大", pinyinBase: "da", tone: 4, initial: "d", final: "a" }, { char: "小", pinyinBase: "xiao", tone: 3, initial: "x", final: "iao" }], english: "big and small" },
{ word: "不是", pinyin: "bú shì", syllables: [{ char: "不", pinyinBase: "bu", tone: 2, initial: "b", final: "u" }, { char: "是", pinyinBase: "shi", tone: 4, initial: "sh", final: "i" }], english: "no; not" },
{ word: "坐下", pinyin: "zuò xià", syllables: [{ char: "坐", pinyinBase: "zuo", tone: 4, initial: "z", final: "uo" }, { char: "下", pinyinBase: "xia", tone: 4, initial: "x", final: "ia" }], english: "sit down" },
{ word: "在", pinyin: "zài", syllables: [{ char: "在", pinyinBase: "zai", tone: 4, initial: "z", final: "ai" }], english: "be; at; in" },
{ word: "山里", pinyin: "shān lǐ", syllables: [{ char: "山", pinyinBase: "shan", tone: 1, initial: "sh", final: "an" }, { char: "里", pinyinBase: "li", tone: 3, initial: "l", final: "i" }], english: "in the mountain" },
{ word: "水火", pinyin: "shuǐ huǒ", syllables: [{ char: "水", pinyinBase: "shui", tone: 3, initial: "sh", final: "ui" }, { char: "火", pinyinBase: "huo", tone: 3, initial: "h", final: "uo" }], english: "water and fire" },
{ word: "人", pinyin: "rén", syllables: [{ char: "人", pinyinBase: "ren", tone: 2, initial: "r", final: "en" }], english: "person; people" },
{ word: "小马", pinyin: "xiǎo mǎ", syllables: [{ char: "小", pinyinBase: "xiao", tone: 3, initial: "x", final: "iao" }, { char: "马", pinyinBase: "ma", tone: 3, initial: "m", final: "a" }], english: "pony; little horse" },

    const initials = ["b","p","m","f","d","t","n","l","g","k","h","j","q","x","zh","ch","sh","r","z","c","s","y","w"];

    const confuseInitials = {
      "b": ["p","d"],"p": ["b","d"],"m": ["n"],"f": ["t","h"],"d": ["t","b","p","q"],"t": ["d","f"],
      "n": ["l","m"],"l": ["n","r"],"g": ["k","q"],"k": ["g","h"],"h": ["k","g"],"j": ["q","x"],

    };
    const confuseFinals = {
      "a": ["ai","an"],"o": ["ou","ong"],"e": ["ei","en"],"i": ["ie","in"],"u": ["ü","un"],"ü": ["üe","un"],
      "ai": ["a","ei"],"ei": ["ai","e"],"ui": ["u","ou"],"ao": ["ou","a"],"ou": ["uo","ong"],"iu": ["i","u"],

      "uo": ["ua","o"],"uai": ["ua","ai"],"uan": ["uang","an"],"uang": ["uan","ang"],"üan": ["üe","uan"]

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function buildPoolForGrade(grade) {
      return gradeWords[grade] || [];
    }

    function decomposePinyin(pinyinBase) {
      let initial = "";
      let final = pinyinBase;
      for (const init of initials) {
        if (pinyinBase.startsWith(init)) {
          initial = init;
          final = pinyinBase.substring(init.length);
          break;
        }
      }
      if (final.startsWith("u") && ["j","q","x"].includes(initial)) {
        final = "ü" + final.substring(1);
      }
      return { initial, final };
    }

    function markTone(s, tone) {
      if (tone === 5 || tone === 0) return s;
      const vowels = 'aeiouü';
      const marks = ['āēīōūǖ', 'áéíóúǘ', 'ǎěǐǒǔǚ', 'àèìòùǜ'];
      let targetIndex = -1;
      let priority = -1;
      for (let i = 0; i < s.length; i++) {
        const idx = vowels.indexOf(s[i]);
        if (idx !== -1) {
          const prio = (s[i] === 'a' || s[i] === 'e' || s[i] === 'o') ? 2 : (s[i] === 'i' && i === s.length - 1 && priority < 1) ? 1 : 0;
          if (prio > priority) {
            targetIndex = i;
            priority = prio;
          }
        }
      }
      if (targetIndex === -1) return s;
      const mark = marks[tone - 1][vowels.indexOf(s[targetIndex])];
      s = s.substring(0, targetIndex) + mark + s.substring(targetIndex + 1);
      if (['j','q','x'].includes(s[0]) && s.includes('ü')) s = s.replace('ü','u');
      return s;
    }

    function buildWordPinyinMarked(syllables) {
      return syllables.map(s => markTone(s.pinyinBase, s.tone)).join(' ');
    }

    function playBaiduTtsForWord(word) {
      const url = `https://tts.baidu.com/text2audio?tex=${word}&cuid=dict&lan=ZH&ctp=2&pdt=30&vol=9`;
      audioEl.src = url; 
      audioEl.play().catch(() => {
        recStatus.textContent = "（请点击播放按钮听取发音）";
      });
    }

    function startGame() {
      wordCorrectStatus = new Array(total).fill(false);  // 先全部标为错
      if (isCustomWords && selectedWords.size > 0) {
        const allWords = Object.values(gradeWords).flat();
        // 修改：增加去重逻辑，确保同一个词只出现一次
        const uniqueMap = new Map();
        allWords.forEach(w => {
            if (selectedWords.has(w.word) && !uniqueMap.has(w.word)) {
                uniqueMap.set(w.word, w);
            }
        });
        pool = Array.from(uniqueMap.values());
      } else {
        pool = buildPoolForGrade(selectedGrade);
      }

      let n = pool.length;
      if (selectedNum !== "all") {
        const cap = selectedNum === "custom" ? customNum : parseInt(selectedNum);
        n = Math.min(cap || n, pool.length);
      }
      if (n < pool.length) pool = shuffleArray(pool).slice(0,n);
      total = pool.length; score = 0; cur = 0;
      order = shuffleArray(Array.from(Array(total).keys()));

      homeSection.style.display = "none";
      gameSection.style.display = "block";
      endSection.style.display = "none";
      gameGradeEl.textContent = isCustomWords ? "自定义选词" : `${selectedGrade}年级`;
      qCountEl.textContent = `${cur+1} / ${total}`;
      scoreText.textContent = `得分：${score}`;
      progressBar.style.width = `0%`;
      showQuestion(cur);
    }

    function showQuestion(index) {
      // 重置所有状态
      isCurrentWordCorrect = true;
      recDone = false;
      recCorrect = false;
      currentStage = 1;
      currentCharIndex = 0;
      writingAttempts = 0;
      nextBtn.style.display = "none";
      
      // 重置UI
      transcriptEl.textContent = "（识别结果）";
      transcriptEl.style.borderColor = transcriptEl.style.background = transcriptEl.style.color = "";
      userRecAudio.style.display = "none";
      userRecAudio.src = "";
      recStatus.textContent = "（未录音）";
      recBtn.style.display = "inline-block";
      stopRecBtn.style.display = "none";
      choicesEl.innerHTML = "";
      stageIndicator.textContent = "第一阶段：请先朗读词语并录音验证";
      stageIndicator.style.backgroundColor = "#f0f7ff";
      stageIndicator.style.color = "#1976d2";
      writingContainer.style.display = "none";
      writingContainer.innerHTML = "";
      wordDisplay.style.display = "flex";

      // 停止并清理媒体资源
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      if (recognition && recognition.state !== "inactive") {
        recognition.stop();
        recognition = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      recordedChunks = [];

      const q = pool[order[index]];
      wordDisplay.innerHTML = q.syllables.map((syl, idx) => `
        <div class="word-char-container">
          <span class="pinyin-display"></span>
          <span class="word-char" data-index="${idx}">${syl.char}</span>
        </div>
      `).join('');
      metaLineEl.textContent = q.english || "（英文释义暂缺）";
      qCountEl.textContent = `${index+1} / ${total}`;
      progressBar.style.width = Math.round((index/total)*100) + "%";
    }

    function checkStageProgress() {
      const q = pool[order[cur]];
      
      // 第一阶段：录音正确后进入第二阶段
      if (currentStage === 1 && recDone && recCorrect) {
        currentStage = 2;
        stageIndicator.textContent = "第二阶段：请选择正确的拼音";
        stageIndicator.style.backgroundColor = "#e8f5e9";
        stageIndicator.style.color = "#2e7d32";
        showPinyinSelectionForChar(currentCharIndex);
      }

      // 第二阶段：所有字拼音选择完成后进入第三阶段
      if (currentStage === 2 && currentCharIndex >= q.syllables.length) {
        currentStage = 3;
        currentCharIndex = 0;
        stageIndicator.textContent = "第三阶段：请书写汉字";
        stageIndicator.style.backgroundColor = "#fffde7";
        stageIndicator.style.color = "#ef6c00";
        choicesEl.innerHTML = "";
        showWritingForChar(currentCharIndex);
      }

      // 第三阶段：所有字书写完成后显示下一题按钮
      if (currentStage === 3 && currentCharIndex >= q.syllables.length) {
        nextBtn.style.display = "inline-block";
      }

      initialOptions = initialOptions.concat(conf);
      while (initialOptions.length < 3) {

      finalOptions = finalOptions.concat(confF);
      while (finalOptions.length < 3) {
        const rand = finals[Math.floor(Math.random() * finals.length)];
        if (!finalOptions.includes(rand)) finalOptions.push(rand);

      finalOptions = shuffleArray(finalOptions);
      finalOptions.forEach(opt => {

    function selectPinyinOption(btn) {
      const type = btn.dataset.type;
      document.querySelectorAll(`.choice[data-type="${type}"]`).forEach(b => b.classList.remove("selected"));

    function handlePinyinSelections() {
      const q = pool[order[cur]];
      const syl = q.syllables[currentCharIndex];
      const correctInitial = syl.initial;
      const correctFinal = syl.final;
      const correctTone = syl.tone;

      const selectedInitial = document.querySelector('.choice[data-type="initial"].selected').dataset.value;
      const selectedFinal = document.querySelector('.choice[data-type="final"].selected').dataset.value;
      const selectedTone = parseInt(document.querySelector('.choice[data-type="tone"].selected').dataset.value, 10);

      let initialCorrect = selectedInitial === correctInitial;
      let finalCorrect = selectedFinal === correctFinal;
      let toneCorrect = selectedTone === correctTone;

      // 标记颜色
      document.querySelectorAll('.choice[data-type="initial"]').forEach(btn => {
        if (btn.dataset.value === correctInitial) btn.classList.add("correct");
        else if (btn.classList.contains("selected")) btn.classList.add("wrong");
      });
      document.querySelectorAll('.choice[data-type="final"]').forEach(btn => {
        if (btn.dataset.value === correctFinal) btn.classList.add("correct");
        else if (btn.classList.contains("selected")) btn.classList.add("wrong");
      });
      document.querySelectorAll('.choice[data-type="tone"]').forEach(btn => {
        if (parseInt(btn.dataset.value, 10) === correctTone) btn.classList.add("correct");
        else if (btn.classList.contains("selected")) btn.classList.add("wrong");

      // 禁用所有按钮
      document.querySelectorAll(".choice").forEach(b => b.disabled = true);
    // 如果全对，显示正确拼音；如果有错，标记当前词为错误
    if (initialCorrect && finalCorrect && toneCorrect) {
      // score++;  <--- 【删除】这里不再立即加分

      const pinyinSpan = wordDisplay.querySelectorAll('.pinyin-display')[currentCharIndex];

      pinyinSpan.style.display = 'block';

    setTimeout(() => {
      currentCharIndex++;
      if (currentCharIndex < q.syllables.length) {

        showPinyinSelectionForChar(currentCharIndex);
      } else {
        // 【新增】整词的所有字都处理完了，检查是否一直保持正确
        if (isCurrentWordCorrect) {
          score++; // 整词全对才加1分
          scoreText.textContent = `得分：${score}`;
          wordCorrectStatus[cur] = true;   // ← 记录这题正确
        }
        checkStageProgress();
      }
    }, 1500);
    }

    function showWritingForChar(charIndex) {
      const q = pool[order[cur]];
      writingContainer.style.display = "flex";
      wordDisplay.style.display = "none";
      writingContainer.innerHTML = q.syllables.map((syl, idx) => {
        if (idx === charIndex) {
          return `<div id="writer-${idx}" class="writer-div"></div>`;
        } else {
          return `<span class="word-char">${syl.char}</span>`;
        }
      }).join('');

      writingAttempts = 0;
      writer = HanziWriter.create(`writer-${charIndex}`, q.syllables[charIndex].char, {
        width: 300,
        height: 300,
        padding: 5,
        showOutline: false,
        radicalColor: '#166E00',
        onCorrectStroke: () => {},
        onComplete: (isMatch) => {
          if (isMatch) {
            setTimeout(() => {
              currentCharIndex++;
              if (currentCharIndex < q.syllables.length) {
                showWritingForChar(currentCharIndex);
              } else {
                checkStageProgress();
              }
            }, 1000);
          } else {
            writingAttempts++;
            if (writingAttempts >= 2) {
              writer.showOutline();
            }
            setTimeout(() => writer.quiz({}), 1000);
          }
        }
      });
      writer.quiz({});
    }

    async function ensureMediaStream() {
      if (mediaStream) return mediaStream;
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      return mediaStream;
    }

    function createRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const rec = new SpeechRecognition();
      rec.lang = 'zh-CN';
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      return rec;
    }

    recBtn.addEventListener("click", async ()=>{
      try {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
        
        const stream = await ensureMediaStream();
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
        mediaRecorder.onstart = () => {
          recStatus.textContent = "（正在录音...请朗读词语）";
          recBtn.style.display = "none";
          stopRecBtn.style.display = "inline-block";
          transcriptEl.textContent = "（录音中...）";
        };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, {type:'audio/webm'});
          userRecAudio.src = URL.createObjectURL(blob);
          userRecAudio.style.display = "inline-block";
          recStatus.textContent = "（录音完成，正在识别...）";
          recBtn.style.display = "inline-block";
          stopRecBtn.style.display = "none";
          recDone = true;
        };
        mediaRecorder.start();
      } catch (e) { 
        alert("无法录音：" + e.message); 
        recStatus.textContent = "（录音失败）";
      }

      if (recognition && recognition.state !== "inactive") {
        recognition.stop();
      }
      recognition = createRecognition();
      
      if (!recognition) {
        transcriptEl.textContent = "（浏览器不支持语音识别）";
        transcriptEl.style.color = "#B71C1C";
        return;
      }
      
      transcriptEl.textContent = "（等待识别...）";
      const q = pool[order[cur]];
      recognition.onresult = e => {
        const text = Array.from(e.results).map(r=>r[0].transcript).join('');
        transcriptEl.textContent = text || "（未识别到）";
        const normalized = text.replace(/\s+/g,'');
        // 严格验证：必须包含所有字符
        const ok = q.word.split('').every(ch => normalized.includes(ch));
        
        if (ok) {
          transcriptEl.style.borderColor = "#4CAF50";
          transcriptEl.style.background = "#E8F5E9";
          transcriptEl.style.color = "#1B5E20";
          recCorrect = true;
          recStatus.textContent = "（朗读正确！）";
        } else {
          transcriptEl.style.borderColor = "#E53935";
          transcriptEl.style.background = "#FFEBEE";
          transcriptEl.style.color = "#B71C1C";
          recCorrect = false;
          recStatus.textContent = "（朗读不正确，请重试）";
        }
        
        checkStageProgress();
      };
      
      recognition.onerror = e => {
        transcriptEl.textContent = "（识别出错）";
        transcriptEl.style.color = "#B71C1C";
        recStatus.textContent = "（请重试）";
      };
      
      recognition.start();
    });

    stopRecBtn.addEventListener("click", ()=>{
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      if (recognition && recognition.state !== "inactive") {
        recognition.stop();
      }
    });

    playSoundBtn.addEventListener("click", ()=>{
      const q = pool[order[cur]];
      playBaiduTtsForWord(q.word);
    });

    nextBtn.addEventListener("click", ()=>{
      cur++;
      if (cur < total) {
        showQuestion(cur);
      } else {
        endGame();
      }
    });

    // 准备本轮词语数据
  const modal = document.getElementById("result-word-modal");

  // 填充数量
  wordCountSpan.textContent = total;

  // 清空旧内容
  listContainer.innerHTML = "";

  // 按游戏顺序填充词语（使用 order 数组保持原始出题顺序）
  order.forEach((originalIndex, displayOrder) => {
    const q = pool[originalIndex];
    const isCorrect = wordCorrectStatus[displayOrder];  // 注意这里用的是显示顺序的索引

    const item = document.createElement("div");

}

    function showCelebrationAnimation(percentage) {
      const celebrationDiv = document.createElement("div");
      celebrationDiv.className = "celebration";
      document.body.appendChild(celebrationDiv);
      
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        confetti.style.animationDelay = Math.random() * 2 + "s";
        celebrationDiv.appendChild(confetti);
      }
      
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const firework = document.createElement("div");
          firework.className = "firework";
          firework.style.left = (Math.random() * 60 + 20) + "vw";
          firework.style.top = (Math.random() * 60 + 20) + "vh";
          firework.style.backgroundColor = [
            "#FF6F61", "#FFB74D", "#4DB6AC", "#64B5F6", "#BA68C8"
          ][Math.floor(Math.random() * 5)];
          celebrationDiv.appendChild(firework);
          
          setTimeout(() => {
            celebrationDiv.removeChild(firework);
          }, 1000);
        }, i * 300);
      }
      
      const supermanCount = percentage >= 90 ? 3 : (percentage >= 70 ? 2 : 1);
      for (let i = 0; i < supermanCount; i++) {
        setTimeout(() => {
          const superman = document.createElement("div");
          superman.className = "superman";
          superman.textContent = "🦸";
          superman.style.top = (30 + i * 20) + '%';
          document.body.appendChild(superman);
          
          setTimeout(() => {
            if (superman.parentNode) {
              document.body.removeChild(superman);
            }
          }, 3000);
        }, i * 500);
      }
      
      setTimeout(() => {
        document.body.removeChild(celebrationDiv);
      }, 5000);
    }

      if (confirm("确定要结束练习并返回首页吗？")) {
        gameSection.style.display = "none";
        homeSection.style.display = "block";
      }
    });

    backHomeBtn.addEventListener("click", ()=>{
      endSection.style.display = "none";
      homeSection.style.display = "block";
    });

      btn.addEventListener("click", ()=>{
        gradeBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedGrade = parseInt(btn.dataset.grade);
        isCustomWords = false;
      });
    });

    numBtns.forEach(btn => {
      btn.addEventListener("click", ()=>{
        numBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedNum = btn.dataset.num;
        customInput.value = "";
        isCustomWords = false;
      });
    });

    customInput.addEventListener("input", ()=>{
      numBtns.forEach(b => b.classList.remove("selected"));
      selectedNum = "custom";
      customNum = parseInt(customInput.value) || 1;
      isCustomWords = false;
    });

    startBtn.addEventListener("click", startGame);

    // 词语选择弹窗相关
    const wordModal = document.getElementById("word-modal");
    const selectWordsBtn = document.getElementById("select-words");
    const startCustomBtn = document.getElementById("start-custom");
    const cancelModalBtn = document.getElementById("cancel-modal");
    const gradeSections = document.getElementById("grade-sections");

    selectWordsBtn.addEventListener("click", () => {
      // 清空之前的内容
      gradeSections.innerHTML = "";
      selectedWords.clear();
      
      // 为每个年级创建词语选择区域
      for (const grade in gradeWords) {
        if (gradeWords[grade].length === 0) continue;
        
        const gradeSection = document.createElement("div");
        gradeSection.className = "grade-section";
        
        const gradeHeader = document.createElement("div");
        gradeHeader.className = "grade-header";
        gradeHeader.innerHTML = `
          <h3>${grade}年级词语</h3>
          <button class="select-all-btn" data-grade="${grade}">全选/取消</button>
        `;
        gradeSection.appendChild(gradeHeader);
        
        const wordGrid = document.createElement("div");
        wordGrid.className = "word-grid";
        
        // 添加该年级的所有词语
        gradeWords[grade].forEach(wordData => {
          const wordBtn = document.createElement("div");
          wordBtn.className = "word-btn";
          wordBtn.textContent = wordData.word;
          wordBtn.dataset.word = wordData.word;
          
          wordBtn.addEventListener("click", () => {
            wordBtn.classList.toggle("selected");
            if (wordBtn.classList.contains("selected")) {
              selectedWords.add(wordData.word);
            } else {
              selectedWords.delete(wordData.word);
            }
          });
          
          wordGrid.appendChild(wordBtn);
        });
        
        gradeSection.appendChild(wordGrid);
        gradeSections.appendChild(gradeSection);
      }
      
      // 添加全选/取消功能
      document.querySelectorAll(".select-all-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const grade = btn.dataset.grade;
          const wordBtns = btn.closest(".grade-section").querySelectorAll(".word-btn");
          const allSelected = Array.from(wordBtns).every(b => b.classList.contains("selected"));
          
          wordBtns.forEach(b => {
            if (allSelected) {
              b.classList.remove("selected");
              selectedWords.delete(b.dataset.word);
            } else {
              b.classList.add("selected");
              selectedWords.add(b.dataset.word);
            }
          });
        });
      });
      
      wordModal.style.display = "flex";
    });

    startCustomBtn.addEventListener("click", () => {
      if (selectedWords.size === 0) {
        alert("请至少选择一个词语");
        return;
      }
      
      isCustomWords = true;
      wordModal.style.display = "none";
      startGame();
    });

    cancelModalBtn.addEventListener("click", () => {
      wordModal.style.display = "none";
    });

    // 点击模态框外部关闭
    wordModal.addEventListener("click", (e) => {
      if (e.target === wordModal) {
        wordModal.style.display = "none";
      }
    });

    // 初始化 - 默认选择四年级
    document.querySelector(`.grade-btn[data-grade="4"]`).classList.add("selected");
  </script>
